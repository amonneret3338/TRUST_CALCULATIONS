--- !Version
geometry: '1.0'
trust: '1.9.8'

--- !include geometry.yaml

--- !Meshing
meshSizeFromPoints:
 'gas': 0.0001
 'fuel_pin': 0.0001

--- !Discretization
space: VEF
time: 
    type: Schema_Euler_implicite
    parameters: |-
       tmax 100000.0
       tinit 0.0
       dt_min 0.001
       dt_max 1000.0
       dt_impr 100.0
       solveur Implicite
       {
           no_qdm
           seuil_convergence_solveur 1e-5
           seuil_convergence_implicite 1e-2
           solveur gmres { seuil 1e-5 }
       }
       facsec 1E6
       seuil_statio 1E-4

--- !Materials
properties: # materials dictionary
  'gas':
    rho: 'Champ_Uniforme 1 6.754e-5'
    lambda: 'Champ_Uniforme 1 0.01'
    Cp: 'Champ_Uniforme 1 1141.1'
    mu: 'Champ_Uniforme 1 4.153e-5'
    beta_th: 'Champ_Uniforme 1 1e-3'
    gravite: 'Champ_Uniforme 2 0 -9.81'
  'fuel_pin':
    rho: 'Champ_Uniforme 1 10110.0'
    lambda: 'Champ_Uniforme 1 10.0'
    Cp: 'Champ_Uniforme 1 350.0'

--- !Problems
radiation:
    emissivity:
      'gas': 1.0
      'fuel_pin' : 0.5
    viewFactors: view_factors_corrected.hdf5
    # viewFactors: view_factors_corrected.facesrayo ; view_factors_corrected.factforme
    reciprocityEnforcement: False
equations:
  'gas':
    Navier_Stokes_standard: |-
      equation_non_resolue 1
      solveur_pression PETSC gcp { precond ssor { omega 1.6 } rtol 1.e-8 impr } 
      convection { amont }
      diffusion { }
      sources { boussinesq_temperature { T0 1000. verif_boussinesq 0 } }
      initial_conditions { vitesse Champ_Uniforme 2 0. 0. }
    Convection_Diffusion_Temperature: |-
      diffusion { }
      convection { amont }
      initial_conditions {
          temperature Champ_fonc_xyz dom_gas 1 (x+0.02506628274631)/(2.0*0.02506628274631)*(@@TP@@-@@TM@@)+@@TM@@
      }
      sources { 
          puissance_thermique Champ_Uniforme 1 0.
      }
  'fuel_pin':
    Conduction: |-
      diffusion { }
      initial_conditions {
          temperature Champ_fonc_xyz dom_fuel_pin 1 (x+0.02506628274631)/(2.0*0.02506628274631)*(@@TP@@-@@TM@@)+@@TM@@
      }
      sources { 
          puissance_thermique Champ_Uniforme 1 0
      }
boundaryConditions:
  'gas': 
    Navier_Stokes_standard: 
      'symetrie': ['y-', 'y+']
      'paroi_fixe': ['x-', 'x+']
    Convection_Diffusion_Temperature:
      'symetrie': ['y-', 'y+']
      'paroi_temperature_imposee Champ_Front_Uniforme 1 @@TM@@': ['x-']
      'paroi_temperature_imposee Champ_Front_Uniforme 1 @@TP@@': ['x+']
postProcessing:
  'gas': &postProcessing |-
    Definition_champs {  
       T_$dom$ Reduction_0D { 
           methode moyenne_ponderee
           source Refchamp { Pb_champ pb_$dom$ temperature } 
       }
    }
    Probes
    {
       T_$dom$ T_$dom$ periode 100. numero_elem_sur_maitre 0
       sonde_T_$dom$ temperature periode 100. segment 100 -0.02506628274631 0.0 0.02506628274631 0.0
    }
    Format lata
    fields dt_post 100.
    {
       temperature elem
       conductivite elem
    }
  'fuel_pin': *postProcessing

